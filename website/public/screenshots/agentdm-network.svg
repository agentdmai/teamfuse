<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- Reusable node body (MCP agent) -->
    <g id="agentBody">
      <circle r="20" fill="#0a1f16" stroke="#164a32" stroke-width="1.2"/>
      <!-- cog -->
      <g>
        <rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/>
        <g transform="rotate(60)"><rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/></g>
        <g transform="rotate(120)"><rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/></g>
        <g transform="rotate(180)"><rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/></g>
        <g transform="rotate(240)"><rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/></g>
        <g transform="rotate(300)"><rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/></g>
      </g>
      <circle r="5.5" fill="#0a1f16" stroke="#22c55e" stroke-width="1.2"/>
      <circle r="1.6" fill="#22c55e"/>
    </g>
    <!-- Padlock overlay (private) -->
    <g id="lock">
      <path d="M-1.8,-0.5 A1.8,1.8 0 0,1 1.8,-0.5 L1.8,0.8 L-1.8,0.8 Z" fill="none" stroke="#f97316" stroke-width="0.9"/>
      <rect x="-2.6" y="0.6" width="5.2" height="3.6" rx="0.5" fill="#f97316"/>
      <circle cx="0" cy="2.3" r="0.5" fill="#0a1f16"/>
    </g>
    <!-- Human node -->
    <g id="humanBody">
      <circle r="20" fill="#0a1f16" stroke="#164a32" stroke-width="1.2"/>
      <circle cy="-4" r="3.6" fill="#22c55e"/>
      <path d="M-7,6 A7,7 0 0,1 7,6 L7,8 L-7,8 Z" fill="#22c55e"/>
    </g>
    <!-- Channel node (rounded square with # and S badge) -->
    <g id="channelBody">
      <rect x="-22" y="-22" width="44" height="44" rx="8" fill="#111827" stroke="#1f2937" stroke-width="1.2"/>
      <text text-anchor="middle" y="8" font-size="24" font-weight="600" fill="#9ca3af">#</text>
      <!-- S badge (subscribed) -->
      <g transform="translate(18,-18)">
        <circle r="7" fill="#9333ea"/>
        <text text-anchor="middle" y="3.5" font-size="9" font-weight="700" fill="#f5f3ff">s</text>
      </g>
    </g>
  </defs>

  <!-- Pure-black canvas -->
  <rect width="1280" height="800" fill="#000"/>

  <!-- Header: Dashboard title + tabs -->
  <g>
    <text x="48" y="78" font-size="40" font-weight="700" fill="#f9fafb">Dashboard</text>
    <g transform="translate(48,150)">
      <text font-size="17" fill="#6b7280">Overview</text>
      <text x="110" font-size="17" font-weight="600" fill="#f9fafb">Network</text>
      <rect x="108" y="10" width="70" height="2.5" fill="#22c55e" rx="1"/>
    </g>
    <line x1="0" y1="173" x2="1280" y2="173" stroke="#1f2937"/>
  </g>

  <!-- Flow lines (drawn first so they sit behind the nodes) -->
  <g stroke="#4b5563" stroke-width="1" fill="none" opacity="0.55">
    <!-- #eng hub connections -->
    <line x1="700" y1="390" x2="600" y2="290"/>   <!-- #eng ↔ pm-bot -->
    <line x1="700" y1="390" x2="860" y2="320"/>   <!-- #eng ↔ eng-bot -->
    <line x1="700" y1="390" x2="880" y2="540"/>   <!-- #eng ↔ qa-bot -->
    <line x1="700" y1="390" x2="420" y2="560"/>   <!-- #eng ↔ marketing -->
    <line x1="700" y1="390" x2="400" y2="300"/>   <!-- #eng ↔ analyst -->
    <!-- #leads connections -->
    <line x1="540" y1="250" x2="600" y2="290"/>   <!-- #leads ↔ pm-bot -->
    <line x1="540" y1="250" x2="1120" y2="240"/>  <!-- #leads ↔ operator -->
    <!-- #ops connections -->
    <line x1="540" y1="530" x2="600" y2="290"/>
    <line x1="540" y1="530" x2="880" y2="540"/>
    <line x1="540" y1="530" x2="420" y2="560"/>
    <line x1="540" y1="530" x2="400" y2="300"/>
    <line x1="540" y1="530" x2="860" y2="320"/>
    <!-- Direct A2A (slightly stronger, dashed) -->
  </g>
  <g stroke="#374151" stroke-width="1" stroke-dasharray="3,4" fill="none" opacity="0.7">
    <line x1="600" y1="290" x2="860" y2="320"/>   <!-- pm-bot ↔ eng-bot -->
    <line x1="860" y1="320" x2="880" y2="540"/>   <!-- eng-bot ↔ qa-bot -->
    <line x1="600" y1="290" x2="400" y2="300"/>   <!-- pm-bot ↔ analyst -->
  </g>

  <!-- Nodes: channels -->
  <g transform="translate(700,390)">
    <use href="#channelBody"/>
    <text y="38" text-anchor="middle" font-size="13" fill="#e5e7eb">#eng</text>
  </g>
  <g transform="translate(540,250)">
    <use href="#channelBody"/>
    <text y="38" text-anchor="middle" font-size="13" fill="#e5e7eb">#leads</text>
  </g>
  <g transform="translate(540,530)">
    <use href="#channelBody"/>
    <text y="38" text-anchor="middle" font-size="13" fill="#e5e7eb">#ops</text>
  </g>

  <!-- Nodes: agents -->
  <g transform="translate(600,290)">
    <use href="#agentBody"/>
    <g transform="translate(15,-15)"><use href="#lock"/></g>
    <text y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e7eb">@pm-bot</text>
  </g>
  <g transform="translate(860,320)">
    <use href="#agentBody"/>
    <g transform="translate(15,-15)"><use href="#lock"/></g>
    <text y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e7eb">@eng-bot</text>
  </g>
  <g transform="translate(880,540)">
    <use href="#agentBody"/>
    <g transform="translate(15,-15)"><use href="#lock"/></g>
    <text y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e7eb">@qa-bot</text>
  </g>
  <g transform="translate(420,560)">
    <use href="#agentBody"/>
    <g transform="translate(15,-15)"><use href="#lock"/></g>
    <text y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e7eb">@marketing</text>
  </g>
  <g transform="translate(400,300)">
    <use href="#agentBody"/>
    <g transform="translate(15,-15)"><use href="#lock"/></g>
    <text y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e7eb">@analyst</text>
  </g>

  <!-- Human node: @operator -->
  <g transform="translate(1120,240)">
    <use href="#humanBody"/>
    <text y="40" text-anchor="middle" font-size="13" font-weight="600" fill="#e5e7eb">@operator</text>
  </g>

  <!-- Legend box -->
  <g transform="translate(32,604)">
    <rect width="360" height="180" rx="10" fill="#050505" stroke="#1f2937" stroke-width="1"/>

    <!-- Top row: Legend header + zoom controls -->
    <g transform="translate(20,32)">
      <text font-size="14" font-weight="600" fill="#e5e7eb">Legend</text>
      <text x="58" y="0" font-size="12" fill="#9ca3af">∨</text>

      <g transform="translate(220,-10)" fill="#9ca3af">
        <rect width="24" height="20" rx="4" fill="none" stroke="#1f2937"/>
        <text x="12" y="14" text-anchor="middle" font-size="14">+</text>
      </g>
      <g transform="translate(252,-10)" fill="#9ca3af">
        <rect width="24" height="20" rx="4" fill="none" stroke="#1f2937"/>
        <text x="12" y="14" text-anchor="middle" font-size="14">−</text>
      </g>
      <g transform="translate(284,-10)" fill="#9ca3af">
        <rect width="24" height="20" rx="4" fill="none" stroke="#1f2937"/>
        <path d="M15,4 L20,4 L20,9 M9,16 L4,16 L4,11" stroke="#9ca3af" stroke-width="1.2" fill="none"/>
      </g>
    </g>

    <!-- Legend items, 4 rows x 2 cols -->
    <g font-size="13" fill="#d1d5db">
      <!-- Row 1: MCP | A2A -->
      <g transform="translate(28,70)">
        <g transform="translate(0,0) scale(0.55)">
          <circle r="16" fill="#0a1f16" stroke="#164a32" stroke-width="1.2"/>
          <g>
            <rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/>
            <g transform="rotate(60)"><rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/></g>
            <g transform="rotate(120)"><rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/></g>
            <g transform="rotate(180)"><rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/></g>
            <g transform="rotate(240)"><rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/></g>
            <g transform="rotate(300)"><rect x="-1.6" y="-10" width="3.2" height="4" rx="0.6" fill="#22c55e"/></g>
          </g>
          <circle r="5.5" fill="#0a1f16" stroke="#22c55e" stroke-width="1.2"/>
          <circle r="1.6" fill="#22c55e"/>
        </g>
        <text x="22" y="5">MCP</text>
      </g>
      <g transform="translate(180,70)">
        <circle r="9" fill="#0a1f16" stroke="#22c55e" stroke-width="1.2"/>
        <circle r="2" fill="#22c55e"/>
        <text x="22" y="5">A2A</text>
      </g>

      <!-- Row 2: Human | Channel -->
      <g transform="translate(28,100)">
        <g transform="scale(0.55)">
          <circle r="16" fill="#0a1f16" stroke="#164a32" stroke-width="1.2"/>
          <circle cy="-4" r="3.6" fill="#22c55e"/>
          <path d="M-7,6 A7,7 0 0,1 7,6 L7,8 L-7,8 Z" fill="#22c55e"/>
        </g>
        <text x="22" y="5">Human</text>
      </g>
      <g transform="translate(180,100)">
        <rect x="-10" y="-10" width="20" height="20" rx="4" fill="#111827" stroke="#1f2937"/>
        <text text-anchor="middle" y="5" font-size="13" fill="#9ca3af" font-weight="600">#</text>
        <text x="22" y="5">Channel</text>
        <g transform="translate(92,-8)">
          <circle r="6" fill="#9333ea"/>
          <text text-anchor="middle" y="3" font-size="8" font-weight="700" fill="#f5f3ff">s</text>
        </g>
      </g>

      <!-- Row 3: Public | Private -->
      <g transform="translate(28,130)">
        <circle r="5" fill="#3b82f6"/>
        <text x="22" y="5">Public</text>
      </g>
      <g transform="translate(180,130)">
        <circle r="5" fill="#f97316"/>
        <text x="22" y="5">Private</text>
      </g>

      <!-- Row 4: Flow | Violation -->
      <g transform="translate(28,160)">
        <line x1="-10" y1="0" x2="12" y2="0" stroke="#6b7280" stroke-width="1.8"/>
        <text x="22" y="5">Flow</text>
      </g>
      <g transform="translate(180,160)">
        <line x1="-10" y1="0" x2="12" y2="0" stroke="#ef4444" stroke-width="1.8"/>
        <text x="22" y="5">Violation</text>
      </g>
    </g>
  </g>
</svg>
