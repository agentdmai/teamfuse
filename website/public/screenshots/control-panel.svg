    <rect width="576" height="140" rx="6" fill="url(#breaker)"/>
    <text x="18" y="24" font-size="10" fill="#94a3b8" letter-spacing="2">BREAKER · @qa-bot</text>
    <circle cx="26" cy="48" r="7" fill="#7dd3fc"/>
    <text x="42" y="52" font-size="13" fill="#f1f5f9" font-weight="600">qa-bot</text>
    <text x="100" y="52" font-size="11" fill="#94a3b8">QA / Test · sleeping · wakes in 04:18</text>
    <text x="18" y="76" font-size="11" fill="#cbd5e1">card ▸ <tspan fill="#64748b">none · inbox clean</tspan></text>
    <text x="18" y="94" font-size="11" fill="#cbd5e1">tool ▸ <tspan fill="#64748b">—</tspan></text>
    <text x="18" y="112" font-size="11" fill="#94a3b8">last ▸ smoked PR #142 green (p95 2.1s, 24 passed)</text>
    <rect x="18" y="122" width="360" height="6" rx="2" fill="#0f172a"/>
    <rect x="18" y="122" width="82" height="6" rx="2" fill="#7dd3fc"/>
    <text x="386" y="128" font-size="10" fill="#94a3b8">1.3M tok · since start</text>
    <g transform="translate(440,16)">
      <rect width="38" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
      <text x="19" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">STOP</text>
      <rect x="44" width="38" height="26" rx="3" fill="#0f172a" stroke="#7dd3fc"/>
      <text x="63" y="18" font-size="10" fill="#7dd3fc" text-anchor="middle">WAKE</text>
      <rect x="88" width="44" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
      <text x="110" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">▸ open</text>
    </g>

    <!-- marketing (starting / chrome) -->
    <g transform="translate(592,0)">
      <rect width="576" height="140" rx="6" fill="url(#breaker)"/>
      <text x="18" y="24" font-size="10" fill="#94a3b8" letter-spacing="2">BREAKER · @marketing <tspan fill="#fcd34d">(chrome)</tspan></text>
      <circle cx="26" cy="48" r="7" fill="#fcd34d">
        <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
      </circle>
      <text x="42" y="52" font-size="13" fill="#f1f5f9" font-weight="600">marketing</text>
      <text x="124" y="52" font-size="11" fill="#94a3b8">Marketing · starting · MCP loading</text>
      <text x="18" y="76" font-size="11" fill="#cbd5e1">card ▸ <tspan fill="#fcd34d">proj-49 · weekly digest post</tspan></text>
      <text x="18" y="94" font-size="11" fill="#cbd5e1">tool ▸ <tspan fill="#64748b">—</tspan></text>
      <text x="18" y="112" font-size="11" fill="#94a3b8">last ▸ SessionStart hook loaded, awaiting first tick</text>
      <rect x="18" y="122" width="360" height="6" rx="2" fill="#0f172a"/>
      <rect x="18" y="122" width="6" height="6" rx="2" fill="#fcd34d"/>
      <text x="386" y="128" font-size="10" fill="#94a3b8">0 tok · started 00:03</text>
      <g transform="translate(440,16)">
        <rect width="38" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
        <text x="19" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">STOP</text>
        <rect x="44" width="38" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
        <text x="63" y="18" font-size="10" fill="#64748b" text-anchor="middle">WAKE</text>
        <rect x="88" width="44" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
        <text x="110" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">▸ open</text>
      </g>
    </g>
  </g>

  <!-- Row 3: analyst + info panel -->
  <g transform="translate(56,602)">
    <!-- analyst -->
    <rect width="576" height="140" rx="6" fill="url(#breaker)"/>
    <text x="18" y="24" font-size="10" fill="#94a3b8" letter-spacing="2">BREAKER · @analyst</text>
    <circle cx="26" cy="48" r="7" fill="#34d399">
      <animate attributeName="opacity" values="1;0.6;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="52" font-size="13" fill="#f1f5f9" font-weight="600">analyst</text>
    <text x="108" y="52" font-size="11" fill="#94a3b8">Analyst · querying</text>
    <text x="18" y="76" font-size="11" fill="#cbd5e1">card ▸ <tspan fill="#fcd34d">hourly sweep · metrics-hourly.jsonl</tspan></text>
    <text x="18" y="94" font-size="11" fill="#cbd5e1">tool ▸ <tspan fill="#7dd3fc">mcp__postgres__query (BEGIN READ ONLY)</tspan></text>
    <text x="18" y="112" font-size="11" fill="#94a3b8">last ▸ 14 metrics emitted, 0 anomalies, digest at 09:00</text>
    <rect x="18" y="122" width="360" height="6" rx="2" fill="#0f172a"/>
    <rect x="18" y="122" width="54" height="6" rx="2" fill="#34d399"/>
    <text x="386" y="128" font-size="10" fill="#94a3b8">850K tok · since start</text>
    <g transform="translate(440,16)">
      <rect width="38" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
      <text x="19" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">STOP</text>
      <rect x="44" width="38" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
      <text x="63" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">WAKE</text>
      <rect x="88" width="44" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
      <text x="110" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">▸ open</text>
    </g>

    <!-- Activity panel -->
    <g transform="translate(592,0)">
      <rect width="576" height="140" rx="6" fill="#1e293b"/>
      <text x="18" y="24" font-size="10" fill="#94a3b8" letter-spacing="2">RECENT ACTIVITY (60s)</text>
      <text x="18" y="52" font-size="11" fill="#cbd5e1"><tspan fill="#34d399">●</tspan> 12:04:18  @eng-bot → @qa-bot   PR #142 ready, please smoke</text>
      <text x="18" y="72" font-size="11" fill="#cbd5e1"><tspan fill="#7dd3fc">●</tspan> 12:04:11  @qa-bot  ← SIGUSR1     woken by supervisor</text>
      <text x="18" y="92" font-size="11" fill="#cbd5e1"><tspan fill="#34d399">●</tspan> 12:03:57  @pm-bot  → #leads     [STATUS] proj-29 over 72h</text>
      <text x="18" y="112" font-size="11" fill="#cbd5e1"><tspan fill="#34d399">●</tspan> 12:03:40  @analyst → @pm-bot    hourly sweep clean</text>
      <text x="18" y="132" font-size="10" fill="#64748b">stream · 4 events · 0 rate limits</text>
    </g>
  </g>

  <!-- Footer legend -->
  <g transform="translate(56,776)">
    <line x1="0" y1="0" x2="1168" y2="0" stroke="#334155"/>
    <text x="0" y="20" font-size="10" fill="#64748b">Legend:</text>
    <circle cx="56" cy="16" r="4" fill="#34d399"/><text x="64" y="20" font-size="10" fill="#94a3b8">running</text>
    <circle cx="126" cy="16" r="4" fill="#7dd3fc"/><text x="134" y="20" font-size="10" fill="#94a3b8">sleeping</text>
    <circle cx="202" cy="16" r="4" fill="#fcd34d"/><text x="210" y="20" font-size="10" fill="#94a3b8">starting</text>
    <circle cx="274" cy="16" r="4" fill="#fca5a5"/><text x="282" y="20" font-size="10" fill="#94a3b8">errored</text>
    <circle cx="344" cy="16" r="4" fill="#64748b"/><text x="352" y="20" font-size="10" fill="#94a3b8">stopped</text>
    <text x="430" y="20" font-size="10" fill="#64748b">· start/stop via mini breaker · wake interrupts sleep · chevron expands detail</text>
    <text x="1168" y="20" font-size="10" fill="#64748b" text-anchor="end">127.0.0.1:3005</text>
  </g>
</svg>
