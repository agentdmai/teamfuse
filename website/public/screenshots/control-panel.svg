<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cbd5e1"/>
      <stop offset="1" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="breaker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="innerShadow" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="860" fill="#0f172a"/>

  <!-- Outer cabinet bezel -->
  <rect x="20" y="20" width="1240" height="820" rx="12" fill="url(#bezel)" stroke="#0f172a" stroke-width="1"/>

  <!-- Inner recessed panel -->
  <rect x="36" y="36" width="1208" height="788" rx="8" fill="#0f172a" stroke="#000" stroke-opacity="0.6"/>

  <!-- Header -->
  <g>
    <text x="56" y="76" font-size="11" letter-spacing="3.3" font-weight="bold" fill="#fcd34d" fill-opacity="0.8">TEAMFUSE · CONTROL PANEL</text>
    <text x="56" y="106" font-size="18" font-weight="600" fill="#f1f5f9">Main load center</text>
    <g transform="translate(1145,78)">
      <circle cx="0" cy="0" r="5" fill="#34d399">
        <animate attributeName="opacity" values="1;0.55;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="14" y="4" font-size="11" fill="#94a3b8" letter-spacing="1.5">LIVE</text>
    </g>
    <line x1="56" y1="122" x2="1224" y2="122" stroke="#334155"/>
  </g>

  <!-- Usage panel -->
  <g transform="translate(56,142)">
    <rect width="820" height="120" rx="6" fill="#1e293b"/>
    <text x="18" y="28" font-size="11" fill="#94a3b8" letter-spacing="2">USAGE</text>
    <text x="765" y="28" font-size="11" fill="#94a3b8" text-anchor="end">reset · window</text>

    <text x="18" y="58" font-size="11" fill="#cbd5e1">5h</text>
    <rect x="60" y="49" width="620" height="10" rx="3" fill="#0f172a"/>
    <rect x="60" y="49" width="275" height="10" rx="3" fill="#34d399"/>
    <text x="690" y="58" font-size="11" fill="#cbd5e1">44.6M / 100M tokens</text>

    <text x="18" y="86" font-size="11" fill="#cbd5e1">7d</text>
    <rect x="60" y="77" width="620" height="10" rx="3" fill="#0f172a"/>
    <rect x="60" y="77" width="97" height="10" rx="3" fill="#7dd3fc"/>
    <text x="690" y="86" font-size="11" fill="#cbd5e1">320M / 2B tokens</text>

    <text x="18" y="108" font-size="10" fill="#64748b">daily: 12.4M   hits: 0   peak since start: 3.4M (@eng-bot)</text>
  </g>

  <!-- Master breaker -->
  <g transform="translate(896,142)">
    <rect width="328" height="120" rx="6" fill="#1e293b"/>
    <text x="18" y="28" font-size="11" fill="#94a3b8" letter-spacing="2">MASTER</text>
    <text x="18" y="46" font-size="11" fill="#cbd5e1">5 / 5 running</text>
    <rect x="18" y="60" width="292" height="44" rx="4" fill="#450a0a" stroke="#7f1d1d"/>
    <text x="164" y="88" font-size="14" fill="#fca5a5" text-anchor="middle" letter-spacing="2" font-weight="bold">KILL ALL</text>
  </g>

  <!-- Agent grid: 3 rows × 2 cols -->
  <!-- Row 1: pm-bot, eng-bot -->
  <g transform="translate(56,282)">
    <!-- pm-bot -->
    <rect width="576" height="140" rx="6" fill="url(#breaker)"/>
    <text x="18" y="24" font-size="10" fill="#94a3b8" letter-spacing="2">BREAKER · @pm-bot</text>
    <circle cx="26" cy="48" r="7" fill="#34d399">
      <animate attributeName="opacity" values="1;0.6;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="52" font-size="13" fill="#f1f5f9" font-weight="600">pm-bot</text>
    <text x="100" y="52" font-size="11" fill="#94a3b8">Product Manager · running</text>
    <text x="18" y="76" font-size="11" fill="#cbd5e1">card ▸ <tspan fill="#fcd34d">proj-42 · promote Todo → In Progress</tspan></text>
    <text x="18" y="94" font-size="11" fill="#cbd5e1">tool ▸ <tspan fill="#7dd3fc">mcp__github__update_project_item_field</tspan></text>
    <text x="18" y="112" font-size="11" fill="#94a3b8">last ▸ triaged 3 DMs, promoted 1, escalated 0</text>
    <!-- Token gauge -->
    <rect x="18" y="122" width="360" height="6" rx="2" fill="#0f172a"/>
    <rect x="18" y="122" width="128" height="6" rx="2" fill="#34d399"/>
    <text x="386" y="128" font-size="10" fill="#94a3b8">1.9M tok · since start</text>
    <!-- Mini breakers -->
    <g transform="translate(440,16)">
      <rect width="38" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
      <text x="19" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">STOP</text>
      <rect x="44" width="38" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
      <text x="63" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">WAKE</text>
      <rect x="88" width="44" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
      <text x="110" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">▸ open</text>
    </g>

    <!-- eng-bot -->
    <g transform="translate(592,0)">
      <rect width="576" height="140" rx="6" fill="url(#breaker)"/>
      <text x="18" y="24" font-size="10" fill="#94a3b8" letter-spacing="2">BREAKER · @eng-bot</text>
      <circle cx="26" cy="48" r="7" fill="#34d399">
        <animate attributeName="opacity" values="1;0.6;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="42" y="52" font-size="13" fill="#f1f5f9" font-weight="600">eng-bot</text>
      <text x="108" y="52" font-size="11" fill="#94a3b8">Engineer · coding</text>
      <text x="18" y="76" font-size="11" fill="#cbd5e1">card ▸ <tspan fill="#fcd34d">proj-38 · add --resume recovery</tspan></text>
      <text x="18" y="94" font-size="11" fill="#cbd5e1">tool ▸ <tspan fill="#7dd3fc">Bash(git commit -m "...")</tspan></text>
      <text x="18" y="112" font-size="11" fill="#94a3b8">last ▸ 3 commits, draft PR opened, DM'd @qa-bot</text>
      <rect x="18" y="122" width="360" height="6" rx="2" fill="#0f172a"/>
      <rect x="18" y="122" width="360" height="6" rx="2" fill="#34d399"/>
      <text x="386" y="128" font-size="10" fill="#94a3b8">3.4M tok · peak</text>
      <g transform="translate(440,16)">
        <rect width="38" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
        <text x="19" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">STOP</text>
        <rect x="44" width="38" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
        <text x="63" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">WAKE</text>
        <rect x="88" width="44" height="26" rx="3" fill="#0f172a" stroke="#334155"/>
        <text x="110" y="18" font-size="10" fill="#94a3b8" text-anchor="middle">▸ open</text>
      </g>
    </g>
  </g>

  <!-- Row 2: qa-bot, marketing -->
  <g transform="translate(56,442)">
